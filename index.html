<script>
// ================== GLOBAL LEADERBOARD USING JSONBIN.IO ==================
// You need to create a free account at https://jsonbin.io/ and replace these values
const JSONBIN_API_KEY = '$2a$10$YourActualApiKeyHere'; // Replace with your actual API key
const JSONBIN_BIN_ID = 'your-bin-id-here'; // Replace with your bin ID
const JSONBIN_URL = `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`;

let leaderboard = [];
let playerName = localStorage.getItem('beeSwarmPlayerName') || '';
let totalHoneyEarned = 0;
let lastUpdate = 0;
const UPDATE_COOLDOWN = 5000; // 5 seconds between updates to avoid rate limiting

// Name modal elements
const nameModal = document.getElementById('nameModal');
const playerNameInput = document.getElementById('playerNameInput');
const saveNameBtn = document.getElementById('saveNameBtn');
const playerNameDisplay = document.getElementById('playerNameDisplay');
const nameError = document.getElementById('nameError');

// ========== LEADERBOARD FUNCTIONS ==========
async function fetchLeaderboard() {
    try {
        const response = await fetch(JSONBIN_URL, {
            headers: {
                'X-Master-Key': JSONBIN_API_KEY
            }
        });
        const data = await response.json();
        leaderboard = data.record.players || [];
        renderLeaderboard();
    } catch (error) {
        console.error('Failed to fetch leaderboard:', error);
        document.getElementById('leaderboardList').innerHTML = '<div class="leaderboard-entry">Failed to load leaderboard</div>';
    }
}

async function saveLeaderboard() {
    try {
        await fetch(JSONBIN_URL, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': JSONBIN_API_KEY
            },
            body: JSON.stringify({ players: leaderboard })
        });
    } catch (error) {
        console.error('Failed to save leaderboard:', error);
    }
}

async function updateLeaderboard() {
    if (!playerName) return;
    
    // Rate limiting
    const now = Date.now();
    if (now - lastUpdate < UPDATE_COOLDOWN) return;
    lastUpdate = now;
    
    // Find or create player entry
    let playerEntry = leaderboard.find(entry => entry.name === playerName);
    if (playerEntry) {
        if (totalHoneyEarned > playerEntry.total) {
            playerEntry.total = totalHoneyEarned;
            await saveLeaderboard();
        }
    } else {
        leaderboard.push({ name: playerName, total: totalHoneyEarned });
        await saveLeaderboard();
    }
    
    renderLeaderboard();
}

function renderLeaderboard() {
    const listDiv = document.getElementById('leaderboardList');
    const sorted = [...leaderboard].sort((a,b) => b.total - a.total).slice(0, 10);
    
    if (sorted.length === 0) {
        listDiv.innerHTML = '<div class="leaderboard-entry">No players yet. Be the first!</div>';
        return;
    }
    
    let html = '';
    sorted.forEach((entry, index) => {
        const isYou = entry.name === playerName ? 'you-row' : '';
        html += `<div class="leaderboard-entry ${isYou}"><span>${index+1}. ${escapeHtml(entry.name)}</span> <span>🍯 ${entry.total.toLocaleString()}</span></div>`;
    });
    listDiv.innerHTML = html;
}

function escapeHtml(unsafe) {
    return unsafe.replace(/[&<>"']/g, function(m) {
        if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;';
        if(m === '"') return '&quot;'; if(m === "'") return '&#039;';
        return m;
    });
}

// Check if name is available (case-insensitive)
async function isNameAvailable(name) {
    await fetchLeaderboard(); // Refresh leaderboard first
    const lowerName = name.toLowerCase();
    return !leaderboard.some(entry => entry.name.toLowerCase() === lowerName);
}

// Save name with validation
saveNameBtn.addEventListener('click', async () => {
    let name = playerNameInput.value.trim();
    if (name === '') name = 'BeeKeeper';
    
    // Check if name is already taken
    const available = await isNameAvailable(name);
    if (!available) {
        nameError.textContent = `❌ Name "${name}" is already taken! Choose another.`;
        return;
    }
    
    playerName = name;
    localStorage.setItem('beeSwarmPlayerName', playerName);
    nameModal.style.display = 'none';
    playerNameDisplay.textContent = `Name: ${playerName}`;
    
    // Add to leaderboard
    leaderboard.push({ name: playerName, total: 0 });
    await saveLeaderboard();
    renderLeaderboard();
    
    // If this is Opleoni, show a secret message
    if (playerName === 'Opleoni') {
        console.log('🔮 Secret adder activated for Opleoni');
    }
});

// Initial load
if (playerName) {
    nameModal.style.display = 'none';
    playerNameDisplay.textContent = `Name: ${playerName}`;
    fetchLeaderboard();
} else {
    nameModal.style.display = 'flex';
    fetchLeaderboard();
}

// Update leaderboard periodically (every 30 seconds)
setInterval(() => {
    if (playerName) {
        updateLeaderboard();
    }
}, 30000);

// ========== GAME CONSTANTS ==========
const HIVE_X = 100, HIVE_Y = 200;
const FLOWER_RADIUS = 16;
const MAX_FLOWERS = 22;
const BEE_SPEED_BASE = 1.1;
const BEE_CAPACITY_BASE = 8;

const SAVE_KEY = 'beeSwarmSave';

// ========== RP PRICING ==========
function getRPCost(rpNumber) {
    return Math.floor(10000 * Math.pow(1.5, rpNumber - 1));
}

function getMaxRPFromHoney() {
    let rpCount = 1;
    while (honey >= getRPCost(rpCount)) {
        rpCount++;
    }
    return rpCount - 1;
}

let honey = 0;

// Tools

const buyScythe = document.getElementById('buyScythe');

// ========== SAVE / LOAD ==========
function saveGame() {
    const saveData = {
        honey,
        totalHoneyEarned,
        bees: bees.map(b => ({
            x: b.x, y: b.y, vx: b.vx, vy: b.vy,
            carrying: b.carrying,
            targetFlower: b.targetFlower,
            returning: b.returning
        })),
        flowers: flowers.map(f => ({
            x: f.x, y: f.y, pollen: f.pollen,
            active: f.active, timer: f.timer
        })),
        nextHireCost,
        hasClippers, hasShears, hasScythe, hasOil,
        hasHoneycomb, hasBeeGun, hasRoyalJelly, hasStarTreat,
        rebirthPoints,
        autoUnlocked, beeSpeedMultiplier, capacityMultiplier, honeyMultUpgrade,
        compoundingLevel, compoundingMultiplier,
        autoActive
    };
    localStorage.setItem(SAVE_KEY, JSON.stringify(saveData));
    saveIndicator.textContent = '💾 Saved ' + new Date().toLocaleTimeString();
    setTimeout(() => { saveIndicator.textContent = '💾 Auto-saved'; }, 2000);
    
    // Update global leaderboard
    updateLeaderboard();
}

function loadGame() {
    const saved = localStorage.getItem(SAVE_KEY);
    if (!saved) return false;

    try {
        const data = JSON.parse(saved);
        honey = data.honey || 0;
        totalHoneyEarned = data.totalHoneyEarned || 0;
        bees = data.bees || [];
        flowers = data.flowers || [];
        nextHireCost = data.nextHireCost || HIRE_COST_BASE;
        hasClippers = data.hasClippers || false;
        hasShears = data.hasShears || false;
        hasScythe = data.hasScythe || false;
        hasOil = data.hasOil || false;
        hasHoneycomb = data.hasHoneycomb || false;
        hasBeeGun = data.hasBeeGun || false;
        hasRoyalJelly = data.hasRoyalJelly || false;
        hasStarTreat = data.hasStarTreat || false;
        rebirthPoints = data.rebirthPoints || 0;
        autoUnlocked = data.autoUnlocked || false;
        beeSpeedMultiplier = data.beeSpeedMultiplier || 1.0;
        capacityMultiplier = data.capacityMultiplier || 1.0;
        honeyMultUpgrade = data.honeyMultUpgrade || 1.0;
        compoundingLevel = data.compoundingLevel || 0;
        compoundingMultiplier = data.compoundingMultiplier || 1.0;
        autoActive = data.autoActive || false;

        if (autoActive && autoUnlocked) {
            toggleAutoBtn.textContent = '⏸️ AUTO (ON)';
            toggleAutoBtn.classList.add('auto-active');
            if (!autoInterval) {
                autoInterval = setInterval(autoBuy, 1000);
            }
        } else {
            autoActive = false;
            toggleAutoBtn.textContent = '⏯️ AUTO (OFF)';
            toggleAutoBtn.classList.remove('auto-active');
        }

        recalcMultiplier();
        updateRebirthUI();
        updateToolButtons();
        return true;
    } catch (e) {
        console.error('Failed to load save', e);
        return false;
    }
}

setInterval(saveGame, 30000);
window.addEventListener('beforeunload', saveGame);

// ========== HELPER FUNCTIONS ==========
function recalcMultiplier() {
    let toolMult = 1.0;
    if (hasClippers) toolMult *= 1.2;
    if (hasShears) toolMult *= 1.5;
    if (hasScythe) toolMult *= 2.0;
    if (hasOil) toolMult *= 3.0;
    if (hasHoneycomb) toolMult *= 1.5;
    if (hasBeeGun) toolMult *= 2.0;
    if (hasRoyalJelly) toolMult *= 3.0;
    if (hasStarTreat) toolMult *= 5.0;
    toolMultiplier = toolMult;
    
    const totalMult = toolMult * honeyMultUpgrade * compoundingMultiplier;
    totalMultDisplay.textContent = `✖️ ${totalMult.toFixed(2)}`;
}

function updateToolButtons() {
    buyClippers.disabled = hasClippers;
    buyShears.disabled = hasShears;
    buyScythe.disabled = hasScythe;
    buyOil.disabled = hasOil;
    buyHoneycomb.disabled = hasHoneycomb;
    buyBeeGun.disabled = hasBeeGun;
    buyRoyalJelly.disabled = hasRoyalJelly;
    buyStarTreat.disabled = hasStarTreat;
}

function spawnFlower() {
    if (flowers.filter(f => f.active).length >= MAX_FLOWERS) return false;
    for (let attempt = 0; attempt < 200; attempt++) {
        const x = 200 + Math.random() * 550;
        const y = 50 + Math.random() * 300;
        if (x < 180) continue;
        let overlap = false;
        for (let f of flowers) {
            if (!f.active) continue;
            const dx = f.x - x, dy = f.y - y;
            if (Math.hypot(dx, dy) < FLOWER_RADIUS * 2.2) {
                overlap = true;
                break;
            }
        }
        if (!overlap) {
            let basePollen = 8 + Math.floor(Math.random() * 12);
            flowers.push({ x, y, pollen: basePollen, active: true, timer: 0 });
            return true;
        }
    }
    return false;
}

function addBee() {
    let capacity = Math.floor(BEE_CAPACITY_BASE * capacityMultiplier);
    bees.push({
        x: HIVE_X + (Math.random() * 30 - 15),
        y: HIVE_Y + (Math.random() * 30 - 15),
        vx: (Math.random() - 0.5) * 2,
        vy: (Math.random() - 0.5) * 2,
        carrying: 0,
        targetFlower: null,
        returning: false
    });
}

function findBestFlower(beeX, beeY) {
    let bestDist = Infinity, bestIndex = -1;
    for (let i = 0; i < flowers.length; i++) {
        const f = flowers[i];
        if (!f.active || f.pollen <= 0) continue;
        const dist = Math.hypot(f.x - beeX, f.y - beeY);
        if (dist < bestDist) { bestDist = dist; bestIndex = i; }
    }
    return bestIndex;
}

function updateRebirthUI() {
    rpSpan.textContent = rebirthPoints;
    rpBadge.textContent = `RP: ${rebirthPoints}`;
    rpShopDisplay.textContent = `RP: ${rebirthPoints}`;
    totalEarnedSpan.textContent = totalHoneyEarned.toLocaleString();

    const maxRP = getMaxRPFromHoney();
    if (maxRP > 0) {
        rebirthInfo.textContent = `${maxRP} RP = ${getRPCost(maxRP).toLocaleString()}🍯`;
    } else {
        rebirthInfo.textContent = `1 RP = ${getRPCost(1).toLocaleString()}🍯`;
    }

    if (autoUnlocked) {
        autoStatus.innerHTML = 'MAXED <span class="maxed-badge">MAX</span>';
        buyAutoUpgrade.disabled = true;
    } else {
        autoStatus.textContent = '(2 RP)';
        buyAutoUpgrade.disabled = rebirthPoints < 2;
    }
    
    if (beeSpeedMultiplier > 1.0) {
        speedStatus.innerHTML = 'MAXED <span class="maxed-badge">MAX</span>';
        buyBeeSpeed.disabled = true;
    } else {
        speedStatus.textContent = '(1 RP)';
        buyBeeSpeed.disabled = rebirthPoints < 1;
    }
    
    if (capacityMultiplier > 1.0) {
        capacityStatus.innerHTML = 'MAXED <span class="maxed-badge">MAX</span>';
        buyCapacity.disabled = true;
    } else {
        capacityStatus.textContent = '(3 RP)';
        buyCapacity.disabled = rebirthPoints < 3;
    }
    
    if (honeyMultUpgrade > 1.0) {
        honeyMultStatus.innerHTML = 'MAXED <span class="maxed-badge">MAX</span>';
        buyHoneyMult.disabled = true;
    } else {
        honeyMultStatus.textContent = '(2 RP)';
        buyHoneyMult.disabled = rebirthPoints < 2;
    }
    
    const compoundingCost = Math.pow(2, compoundingLevel);
    compoundingLevelSpan.textContent = compoundingLevel;
    compoundingCostSpan.textContent = compoundingCost;
    const compoundingBonus = ((compoundingMultiplier - 1) * 100).toFixed(1);
    buyCompounding.innerHTML = `📈 COMPOUNDING lv<span id="compoundingLevel">${compoundingLevel}</span> (<span id="compoundingCost">${compoundingCost}</span> RP) +${compoundingBonus}%`;
    buyCompounding.disabled = rebirthPoints < compoundingCost;
}

// ========== GAME MECHANICS ==========
function update() {
    for (let i = flowers.length - 1; i >= 0; i--) {
        const f = flowers[i];
        if (!f.active) {
            f.timer--;
            if (f.timer <= 0) {
                if (flowers.filter(fl => fl.active).length < MAX_FLOWERS) {
                    f.active = true;
                    f.pollen = 8 + Math.floor(Math.random() * 12);
                    f.timer = 0;
                }
            }
        }
    }
    if (flowers.filter(f => f.active).length < 5) spawnFlower();

    for (let b of bees) {
        let maxCap = Math.floor(BEE_CAPACITY_BASE * capacityMultiplier);
        if (b.carrying >= maxCap) {
            b.returning = true;
            b.targetFlower = null;
        }

        if (b.returning) {
            const dx = HIVE_X - b.x, dy = HIVE_Y - b.y;
            const dist = Math.hypot(dx, dy);
            if (dist < 20) {
                let deposited = Math.floor(b.carrying * toolMultiplier * honeyMultUpgrade * compoundingMultiplier);
                honey += deposited;
                totalHoneyEarned += deposited;
                b.carrying = 0;
                b.returning = false;
            } else {
                b.vx += (dx / dist) * 0.1 * beeSpeedMultiplier;
                b.vy += (dy / dist) * 0.1 * beeSpeedMultiplier;
            }
        } else {
            if (b.targetFlower === null || b.targetFlower >= flowers.length || 
                !flowers[b.targetFlower]?.active || flowers[b.targetFlower].pollen <= 0) {
                b.targetFlower = findBestFlower(b.x, b.y);
            }

            if (b.targetFlower !== null && b.targetFlower < flowers.length) {
                const target = flowers[b.targetFlower];
                if (target.active && target.pollen > 0) {
                    const dx = target.x - b.x, dy = target.y - b.y;
                    const dist = Math.hypot(dx, dy);
                    if (dist < FLOWER_RADIUS + 5) {
                        const collect = Math.min(maxCap - b.carrying, target.pollen);
                        b.carrying += collect;
                        target.pollen -= collect;
                        if (target.pollen <= 0) {
                            target.active = false;
                            target.timer = 200;
                            b.targetFlower = null;
                        }
                    } else {
                        b.vx += (dx / dist) * 0.1 * beeSpeedMultiplier;
                        b.vy += (dy / dist) * 0.1 * beeSpeedMultiplier;
                    }
                } else b.targetFlower = null;
            } else {
                b.vx += (Math.random() - 0.5) * 0.1 * beeSpeedMultiplier;
                b.vy += (Math.random() - 0.5) * 0.1 * beeSpeedMultiplier;
            }
        }

        const speed = Math.hypot(b.vx, b.vy);
        const maxSpeed = BEE_SPEED_BASE * beeSpeedMultiplier;
        if (speed > maxSpeed) {
            b.vx = (b.vx / speed) * maxSpeed;
            b.vy = (b.vy / speed) * maxSpeed;
        }

        b.x += b.vx; b.y += b.vy;
        if (b.x < 10) { b.x = 10; b.vx *= -0.5; }
        if (b.x > 790) { b.x = 790; b.vx *= -0.5; }
        if (b.y < 10) { b.y = 10; b.vy *= -0.5; }
        if (b.y > 390) { b.y = 390; b.vy *= -0.5; }
    }

    honeySpan.textContent = Math.floor(honey);
    beeCountSpan.textContent = bees.length;
    const activeFlowers = flowers.filter(f => f.active).length;
    fieldInfo.textContent = `🌸 ${activeFlowers} flowers`;
    hireCostSpan.textContent = nextHireCost;
    updateRebirthUI();
}

// ========== DRAWING ==========
function draw() {
    ctx.clearRect(0, 0, 800, 400);
    const grad = ctx.createLinearGradient(0, 0, 0, 400);
    grad.addColorStop(0, '#9ccc7c'); grad.addColorStop(1, '#5f8b4b');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, 800, 400);

    ctx.shadowColor = '#402d16'; ctx.shadowBlur = 12;
    ctx.fillStyle = '#c99a3b';
    ctx.beginPath(); ctx.ellipse(HIVE_X-5, HIVE_Y-10, 40, 30, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#b57c2a'; ctx.beginPath(); ctx.ellipse(HIVE_X, HIVE_Y, 44, 34, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e3b15a'; ctx.beginPath(); ctx.ellipse(HIVE_X-5, HIVE_Y-5, 30, 22, 0, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0; ctx.font = '30px "Segoe UI"'; ctx.fillStyle = '#f5d742'; ctx.fillText('🏠', HIVE_X-30, HIVE_Y+10);

    for (let f of flowers) {
        if (!f.active) { ctx.globalAlpha = 0.3; ctx.fillStyle = '#755d3b'; ctx.beginPath(); ctx.arc(f.x, f.y, FLOWER_RADIUS-4,0,2*Math.PI); ctx.fill(); ctx.globalAlpha=1; continue; }
        ctx.shadowBlur = 8; ctx.shadowColor = '#4f2f0a';
        ctx.fillStyle = '#f5a3c7'; ctx.beginPath(); ctx.arc(f.x-4, f.y-4, 7,0,2*Math.PI); ctx.fill();
        ctx.fillStyle = '#ffea9f'; ctx.beginPath(); ctx.arc(f.x+4, f.y+2, 7,0,2*Math.PI); ctx.fill();
        ctx.fillStyle = '#e6d358'; ctx.beginPath(); ctx.arc(f.x, f.y, 9,0,2*Math.PI); ctx.fill();
        ctx.shadowBlur = 4; ctx.font = 'bold 14px monospace'; ctx.fillStyle = '#422b0e'; ctx.fillText(f.pollen, f.x-12, f.y-15);
    }

    for (let b of bees) {
        ctx.shadowBlur = 6; ctx.shadowColor = '#141c0e';
        ctx.fillStyle = '#f2b137'; ctx.beginPath(); ctx.ellipse(b.x, b.y, 12, 8, 0, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#3f2e1c'; ctx.fillRect(b.x-8, b.y-3, 4, 6); ctx.fillRect(b.x+4, b.y-3, 4, 6);
        ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(b.x-6, b.y-4, 2,0,2*Math.PI); ctx.fill(); ctx.beginPath(); ctx.arc(b.x+2, b.y-4, 2,0,2*Math.PI); ctx.fill();
        ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(b.x-7, b.y-5, 1,0,2*Math.PI); ctx.fill(); ctx.beginPath(); ctx.arc(b.x+1, b.y-5, 1,0,2*Math.PI); ctx.fill();
        ctx.fillStyle = '#c9e9fa'; ctx.globalAlpha = 0.6;
        ctx.beginPath(); ctx.ellipse(b.x-8, b.y-12, 6, 3, 0.2, 0, 2*Math.PI); ctx.fill();
        ctx.beginPath(); ctx.ellipse(b.x+4, b.y-12, 6, 3, -0.2, 0, 2*Math.PI); ctx.fill();
        ctx.globalAlpha = 1;
        if (b.carrying > 0) { ctx.font = '16px sans-serif'; ctx.fillStyle = '#fcdb6a'; ctx.fillText('✨', b.x-12, b.y-25); }
    }
    ctx.shadowBlur = 0;
}

// ========== AUTOMATION ==========
function autoBuy() {
    if (!autoActive || !autoUnlocked) return;

    if (!hasClippers && honey >= 50) { honey -= 50; hasClippers = true; recalcMultiplier(); buyClippers.disabled = true; saveGame(); }
    else if (!hasShears && honey >= 150) { honey -= 150; hasShears = true; recalcMultiplier(); buyShears.disabled = true; saveGame(); }
    else if (!hasScythe && honey >= 400) { honey -= 400; hasScythe = true; recalcMultiplier(); buyScythe.disabled = true; saveGame(); }
    else if (!hasOil && honey >= 900) { honey -= 900; hasOil = true; recalcMultiplier(); buyOil.disabled = true; saveGame(); }
    else if (!hasHoneycomb && honey >= 25000) { honey -= 25000; hasHoneycomb = true; recalcMultiplier(); buyHoneycomb.disabled = true; saveGame(); }
    else if (!hasBeeGun && honey >= 50000) { honey -= 50000; hasBeeGun = true; recalcMultiplier(); buyBeeGun.disabled = true; saveGame(); }
    else if (!hasRoyalJelly && honey >= 100000) { honey -= 100000; hasRoyalJelly = true; recalcMultiplier(); buyRoyalJelly.disabled = true; saveGame(); }
    else if (!hasStarTreat && honey >= 250000) { honey -= 250000; hasStarTreat = true; recalcMultiplier(); buyStarTreat.disabled = true; saveGame(); }

    while (honey >= nextHireCost) {
        honey -= nextHireCost;
        addBee();
        nextHireCost = Math.floor(nextHireCost * 1.5);
        saveGame();
    }
    hireCostSpan.textContent = nextHireCost;
}

function toggleAuto() {
    if (!autoUnlocked) { alert('Buy AUTO upgrade first!'); return; }
    autoActive = !autoActive;
    toggleAutoBtn.textContent = autoActive ? '⏸️ AUTO (ON)' : '⏯️ AUTO (OFF)';
    toggleAutoBtn.classList.toggle('auto-active', autoActive);
    if (autoActive) { if (!autoInterval) autoInterval = setInterval(autoBuy, 1000); }
    else { if (autoInterval) { clearInterval(autoInterval); autoInterval = null; } }
    saveGame();
}

// ========== EVENT LISTENERS ==========
canvas.addEventListener('click', (e) => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;

    for (let f of flowers) {
        if (!f.active) continue;
        if (Math.hypot(f.x - x, f.y - y) < FLOWER_RADIUS + 10) {
            f.pollen = Math.min(30, f.pollen + 5);
            honey = Math.max(0, honey - 1);
            return;
        }
    }
    if (flowers.length < 30) flowers.push({ x, y, pollen: 8, active: true, timer: 0 });
});

hireBtn.addEventListener('click', () => {
    if (honey >= nextHireCost) {
        honey -= nextHireCost;
        addBee();
        nextHireCost = Math.floor(nextHireCost * 1.5);
        hireCostSpan.textContent = nextHireCost;
        saveGame();
    }
});

resetBtn.addEventListener('click', () => {
    if (confirm('Reset ALL progress? Name will stay on leaderboard.')) {
        honey = 0; totalHoneyEarned = 0; bees = []; flowers = []; nextHireCost = HIRE_COST_BASE;
        hasClippers = false; hasShears = false; hasScythe = false; hasOil = false;
        hasHoneycomb = false; hasBeeGun = false; hasRoyalJelly = false; hasStarTreat = false;
        rebirthPoints = 0; autoUnlocked = false; beeSpeedMultiplier = 1.0; capacityMultiplier = 1.0; honeyMultUpgrade = 1.0;
        compoundingLevel = 0; compoundingMultiplier = 1.0;
        autoActive = false; if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
        toggleAutoBtn.textContent = '⏯️ AUTO (OFF)'; toggleAutoBtn.classList.remove('auto-active');
        addBee();
        for (let i = 0; i < 14; i++) spawnFlower();
        recalcMultiplier(); updateRebirthUI(); updateToolButtons(); hireCostSpan.textContent = nextHireCost;
        localStorage.removeItem(SAVE_KEY);
        saveGame();
    }
});

// ========== REBIRTH ==========
rebirthBtn.addEventListener('click', () => {
    const maxRP = getMaxRPFromHoney();
    
    if (maxRP > 0) {
        const cost = getRPCost(maxRP);
        rebirthPoints += maxRP;
        
        bees = []; 
        flowers = []; 
        nextHireCost = HIRE_COST_BASE;
        
        hasClippers = false; hasShears = false; hasScythe = false; hasOil = false;
        hasHoneycomb = false; hasBeeGun = false; hasRoyalJelly = false; hasStarTreat = false;
        
        addBee();
        for (let i = 0; i < 14; i++) {
            spawnFlower();
        }
        
        honey = 0;
        
        recalcMultiplier(); 
        updateRebirthUI(); 
        updateToolButtons(); 
        hireCostSpan.textContent = nextHireCost;
        saveGame();
        
        alert(`✨ Purchased ${maxRP} RP for ${cost.toLocaleString()} honey! Honey reset to 0.`);
    } else {
        alert(`❌ Need at least ${getRPCost(1).toLocaleString()} honey for 1 RP!`);
    }
});

// ========== REBIRTH SHOP ==========
buyAutoUpgrade.addEventListener('click', () => { 
    if (rebirthPoints >= 2 && !autoUnlocked) { 
        rebirthPoints -= 2; 
        autoUnlocked = true; 
        updateRebirthUI(); 
        saveGame(); 
    } 
});

buyBeeSpeed.addEventListener('click', () => { 
    if (rebirthPoints >= 1 && beeSpeedMultiplier === 1.0) { 
        rebirthPoints -= 1; 
        beeSpeedMultiplier = 1.5; 
        updateRebirthUI(); 
        saveGame(); 
    } 
});

buyCapacity.addEventListener('click', () => { 
    if (rebirthPoints >= 3 && capacityMultiplier === 1.0) { 
        rebirthPoints -= 3; 
        capacityMultiplier = 2.0; 
        updateRebirthUI(); 
        saveGame(); 
    } 
});

buyHoneyMult.addEventListener('click', () => { 
    if (rebirthPoints >= 2 && honeyMultUpgrade === 1.0) { 
        rebirthPoints -= 2; 
        honeyMultUpgrade = 5.0; 
        recalcMultiplier(); 
        updateRebirthUI(); 
        saveGame(); 
    } 
});

buyCompounding.addEventListener('click', () => {
    const cost = Math.pow(2, compoundingLevel);
    if (rebirthPoints >= cost) {
        rebirthPoints -= cost;
        compoundingLevel++;
        compoundingMultiplier = Math.pow(1.25, compoundingLevel);
        recalcMultiplier();
        updateRebirthUI();
        saveGame();
    }
});

// Tool purchases
buyClippers.addEventListener('click', () => { if (!hasClippers && honey>=50) { honey-=50; hasClippers=true; recalcMultiplier(); buyClippers.disabled=true; saveGame(); } });
buyShears.addEventListener('click', () => { if (!hasShears && honey>=150) { honey-=150; hasShears=true; recalcMultiplier(); buyShears.disabled=true; saveGame(); } });
buyScythe.addEventListener('click', () => { if (!hasScythe && honey>=400) { honey-=400; hasScythe=true; recalcMultiplier(); buyScythe.disabled=true; saveGame(); } });
buyOil.addEventListener('click', () => { if (!hasOil && honey>=900) { honey-=900; hasOil=true; recalcMultiplier(); buyOil.disabled=true; saveGame(); } });
buyHoneycomb.addEventListener('click', () => { if (!hasHoneycomb && honey>=25000) { honey-=25000; hasHoneycomb=true; recalcMultiplier(); buyHoneycomb.disabled=true; saveGame(); } });
buyBeeGun.addEventListener('click', () => { if (!hasBeeGun && honey>=50000) { honey-=50000; hasBeeGun=true; recalcMultiplier(); buyBeeGun.disabled=true; saveGame(); } });
buyRoyalJelly.addEventListener('click', () => { if (!hasRoyalJelly && honey>=100000) { honey-=100000; hasRoyalJelly=true; recalcMultiplier(); buyRoyalJelly.disabled=true; saveGame(); } });
buyStarTreat.addEventListener('click', () => { if (!hasStarTreat && honey>=250000) { honey-=250000; hasStarTreat=true; recalcMultiplier(); buyStarTreat.disabled=true; saveGame(); } });

toggleAutoBtn.addEventListener('click', toggleAuto);

// ========== SECRET ADDER ==========
addHoneyBtn.addEventListener('click', () => {
    if (playerName === 'Opleoni') {
        let val = parseInt(honeyInput.value);
        if (!isNaN(val) && val > 0) {
            honey += val;
            saveGame();
            console.log('🔮 Added', val, 'honey for Opleoni');
        }
    } else {
        alert('❌ Honey adder is only available for player Opleoni!');
    }
});

// ========== INIT ==========
function init() {
    if (!loadGame()) {
        addBee();
        for (let i = 0; i < 14; i++) spawnFlower();
    }
    recalcMultiplier(); updateRebirthUI(); updateToolButtons(); hireCostSpan.textContent = nextHireCost;
    saveGame();
}
init();

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
gameLoop();
</script>
